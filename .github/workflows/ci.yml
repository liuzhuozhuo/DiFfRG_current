name: CI

# Build the DiFfRG library and run the test suite against the pre-built
# dependency image (ghcr.io/satfra/diffrg-deps), so the slow superbuild
# (deal.II, Kokkos, ...) is not repeated on every run. Refresh that image with
# containers/ci/build-and-push.sh when the bundled dependencies change.

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    name: Build library + run tests (CPU, Singularity)
    runs-on: [self-hosted, linux, x64]
    env:
      DIFFRG_DEPS_IMAGE: docker://ghcr.io/satfra/diffrg-deps:ubuntu24.04
    steps:
      - uses: actions/checkout@v4

      - name: Pull dependency image
        id: deps
        env:
          SINGULARITY_DOCKER_USERNAME: ${{ github.actor }}
          SINGULARITY_DOCKER_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if command -v singularity >/dev/null 2>&1; then
            singularity_bin=singularity
          elif command -v apptainer >/dev/null 2>&1; then
            singularity_bin=apptainer
          else
            echo "Neither singularity nor apptainer was found on PATH." >&2
            exit 127
          fi
          sif="${RUNNER_TEMP}/diffrg-deps-ubuntu24.04.sif"
          "${singularity_bin}" pull --force "${sif}" "${DIFFRG_DEPS_IMAGE}"
          echo "sif=${sif}" >> "$GITHUB_OUTPUT"
          "${singularity_bin}" exec --cleanenv "${sif}" bash -lc 'test -r "${DiFfRG_BUNDLED_DIR:-/opt/diffrg/bundled}"'

      - name: Build DiFfRG library
        id: build
        run: |
          set -euo pipefail
          bash containers/singularity-run.sh \
            -b "${GITHUB_WORKSPACE}:/work" \
            -w /work \
            "${{ steps.deps.outputs.sif }}" \
            bash -lc '
              set -euo pipefail
              cmake -S DiFfRG -B DiFfRG/bin \
                -DBUNDLED_DIR="${DiFfRG_BUNDLED_DIR:-/opt/diffrg/bundled}" \
                -DCMAKE_BUILD_TYPE=Release \
                -DDiFfRG_TEST=ON \
                -DDiFfRG_DOCUMENTATION=OFF \
                -DNATIVE=OFF
              cmake --build DiFfRG/bin -j "$(nproc)"
            '

      # Runs only when the build succeeded (default fail-fast). Uses `set +e` so a
      # test failure doesn't abort here -- we record the result, publish the badge,
      # then fail the job at the end so a red badge is still written on failure.
      - name: Run tests
        id: tests
        run: |
          set +e
          bash containers/singularity-run.sh \
            -b "${GITHUB_WORKSPACE}:/work" \
            -w /work \
            "${{ steps.deps.outputs.sif }}" \
            bash -lc 'ctest --test-dir DiFfRG/bin -j "$(nproc)" --output-on-failure' | tee "${RUNNER_TEMP}/ctest.log"
          # ctest always prints: "<P>% tests passed, <F> tests failed out of <T>"
          summary=$(grep -Eo '[0-9]+ tests failed out of [0-9]+' "${RUNNER_TEMP}/ctest.log" | tail -1)
          failed=$(echo "$summary" | awk '{print $1}')
          total=$(echo "$summary" | awk '{print $NF}')
          passed=$((total - failed))
          echo "passed=$passed" >> "$GITHUB_OUTPUT"
          echo "total=$total"   >> "$GITHUB_OUTPUT"
          echo "failed=$failed" >> "$GITHUB_OUTPUT"
          echo "### Tests: ${passed}/${total} passing" >> "$GITHUB_STEP_SUMMARY"

      # Decide the badge text/colour. Runs even if the build failed (always()), so a
      # broken build shows a red "build failed" badge instead of leaving the gist at
      # its stale/placeholder value.
      - name: Compute badge content
        id: badge
        if: always() && github.event_name == 'push'
        run: |
          if [ "${{ steps.build.outcome }}" != "success" ]; then
            echo "message=build failed" >> "$GITHUB_OUTPUT"
            echo "color=red"            >> "$GITHUB_OUTPUT"
          elif [ -z "${{ steps.tests.outputs.total }}" ]; then
            echo "message=no tests run" >> "$GITHUB_OUTPUT"
            echo "color=red"            >> "$GITHUB_OUTPUT"
          else
            echo "message=${{ steps.tests.outputs.passed }}/${{ steps.tests.outputs.total }} passing" >> "$GITHUB_OUTPUT"
            if [ "${{ steps.tests.outputs.failed }}" = "0" ]; then
              echo "color=brightgreen" >> "$GITHUB_OUTPUT"
            else
              echo "color=red"         >> "$GITHUB_OUTPUT"
            fi
          fi

      # Publish to a Gist that shields.io reads (see containers/ci/README.md for
      # setup). Only on push to main: PRs (esp. from forks) can't access secrets.
      - name: Update test-count badge
        if: always() && github.event_name == 'push'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: 336ebc0aaa7dc9a0e71ca01dd4361a12
          filename: diffrg-tests.json
          label: tests
          message: ${{ steps.badge.outputs.message }}
          color: ${{ steps.badge.outputs.color }}

      # Reflect build/test failures in the job conclusion (the test step swallows
      # ctest's exit code on purpose; the build step's failure is preserved here too).
      - name: Fail the job if the build or any test failed
        if: always()
        run: |
          if [ "${{ steps.build.outcome }}" != "success" ]; then
            echo "Build failed."
            exit 1
          fi
          if [ "${{ steps.tests.outputs.failed }}" != "0" ]; then
            echo "${{ steps.tests.outputs.failed }} test(s) failed."
            exit 1
          fi
