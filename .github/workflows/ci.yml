name: CI

# Build the DiFfRG library and run the test suite against the pre-built
# dependency image (ghcr.io/satfra/diffrg-deps), so the slow superbuild
# (deal.II, Kokkos, ...) is not repeated on every run. Refresh that image with
# containers/ci/build-and-push.sh when the bundled dependencies change.

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    name: Build library + run tests (CPU)
    runs-on: ubuntu-latest
    # CPU dependency image. If the GHCR package is private, add:
    #   credentials:
    #     username: ${{ github.actor }}
    #     password: ${{ secrets.GITHUB_TOKEN }}
    container:
      image: ghcr.io/satfra/diffrg-deps:ubuntu24.04
    steps:
      - uses: actions/checkout@v4

      - name: Build DiFfRG library
        run: |
          cmake -S DiFfRG -B DiFfRG/bin \
            -DBUNDLED_DIR="${DiFfRG_BUNDLED_DIR:-/opt/DiFfRG/bundled}" \
            -DCMAKE_BUILD_TYPE=Release \
            -DDiFfRG_TEST=ON \
            -DDiFfRG_DOCUMENTATION=OFF
          cmake --build DiFfRG/bin -j 4

      - name: Run tests
        id: tests
        run: |
          set +e
          ctest --test-dir DiFfRG/bin --output-on-failure | tee /tmp/ctest.log
          # don't fail the job here -- we record the result, publish the badge,
          # then fail at the end so a red badge still gets written on failure.
          # ctest always prints: "<P>% tests passed, <F> tests failed out of <T>"
          summary=$(grep -Eo '[0-9]+ tests failed out of [0-9]+' /tmp/ctest.log | tail -1)
          failed=$(echo "$summary" | awk '{print $1}')
          total=$(echo "$summary" | awk '{print $NF}')
          passed=$((total - failed))
          echo "passed=$passed"   >> "$GITHUB_OUTPUT"
          echo "total=$total"     >> "$GITHUB_OUTPUT"
          echo "failed=$failed"   >> "$GITHUB_OUTPUT"
          if [ "${failed:-1}" -eq 0 ]; then echo "color=brightgreen" >> "$GITHUB_OUTPUT"; else echo "color=red" >> "$GITHUB_OUTPUT"; fi
          echo "### Tests: ${passed}/${total} passing" >> "$GITHUB_STEP_SUMMARY"

      # Publish the count to a Gist that shields.io reads (see containers/ci/README.md
      # for setup). Only on push to main: PRs (esp. from forks) can't access secrets.
      - name: Update test-count badge
        if: github.event_name == 'push'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: 336ebc0aaa7dc9a0e71ca01dd4361a12
          filename: diffrg-tests.json
          label: tests
          message: ${{ steps.tests.outputs.passed }}/${{ steps.tests.outputs.total }} passing
          color: ${{ steps.tests.outputs.color }}

      - name: Fail the job if any test failed
        if: steps.tests.outputs.failed != '0'
        run: |
          echo "${{ steps.tests.outputs.failed }} test(s) failed."
          exit 1
