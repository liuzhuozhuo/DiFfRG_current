name: Documentation
run-name: Build and deploy the documentation
on: [push]
jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      - name: Install Doxygen and Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential graphviz
          wget https://www.doxygen.nl/files/doxygen-1.12.0.linux.bin.tar.gz
          tar xfv doxygen-1.12.0.linux.bin.tar.gz
          cd doxygen-1.12.0/
          sudo make install
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # doxysphinx supports Python 3.9–3.12 only.
          python-version: '3.12'
      - name: Install documentation toolchain
        run: python -m pip install -r DiFfRG/documentation/requirements.txt
      - name: Build unified documentation (C++ / Python / Mathematica)
        run: bash DiFfRG/documentation/build.sh
      - name: Upload static files as artifact
        if: github.ref == 'refs/heads/main'
        id: deployment
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./DiFfRG/documentation/_build/html
  # Deployment job
  deploy:
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      pages: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
        - name: Deploy to GitHub Pages
          id: deployment
          uses: actions/deploy-pages@v4
