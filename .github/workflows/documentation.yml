name: Documentation
run-name: Build and deploy the documentation
on:
  push:
    branches:
      - main
jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    #runs-on: [self-hosted, Linux, X64]
    # The dependency image already bakes doxygen, graphviz and python3, so the
    # docs toolchain is installed inside this ephemeral container -- never on the
    # self-hosted node. The docs build is robust to the doxygen version
    # (fix_doxygen_css.py handles >=1.13 and is a no-op otherwise).
    container:
      image: ghcr.io/satfra/diffrg-deps:ubuntu24.04
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      - name: Install Python documentation toolchain
        run: |
          apt-get update && apt-get install -y --no-install-recommends python3-venv
          python3 -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r DiFfRG/documentation/requirements.txt
      - name: Build unified documentation (C++ / Python / Mathematica)
        run: |
          . .venv/bin/activate
          bash DiFfRG/documentation/build.sh
      - name: Upload static files as artifact
        if: github.ref == 'refs/heads/main'
        id: deployment
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./DiFfRG/documentation/_build/html
  # Deployment job
  deploy:
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      pages: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
        - name: Deploy to GitHub Pages
          id: deployment
          uses: actions/deploy-pages@v4
