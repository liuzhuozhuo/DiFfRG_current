name: Build dependency image

# Manual fallback for rebuilding the stable dependency image outside the main CI
# dependency chain.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish"
        required: true
        default: "ubuntu24.04"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: satfra/diffrg-deps

jobs:
  build-deps-image:
    name: Build dependency image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push CPU dependency image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/ci/ubuntu24.04-deps.Dockerfile
          push: true
          build-args: |
            threads=4
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.tag }}-${{ github.run_number }}
